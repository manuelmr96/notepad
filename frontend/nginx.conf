server {
  listen 80;

  # Reverse-proxy the API so prod is same-origin (frontend + /api on one host).
  # This keeps SameSite=Strict refresh cookies working without any CORS config
  # (mirrors the Vite dev proxy; resolves Phase 1 Open Question 1 with Plan 01).
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA history fallback: serve index.html for any non-asset, non-API route.
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
